<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toy Game (AA/QQ vs. KK)</title>
  <style>
    body { font-family: sans-serif; margin: 6px; }
    .layout { display: grid; grid-template-columns: max-content minmax(420px, 1fr); gap: 10px; align-items: start; }
    .section { margin-bottom: 10px; }
    .stack { display: grid; gap: 8px; }
    .grid-wrap { position: relative; width: min(calc(100vh - 24px), 70vw); }
    .hand-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 0; width: 100%; align-self: start; }
    .hand-cell, .combo-chip { position: relative; border: 1px solid #999; cursor: pointer; overflow: hidden; background: #000; }
    .hand-cell { aspect-ratio: 1 / 1; min-height: 34px; }
    .hand-cell.selected, .combo-chip.selected { outline: none; }
    .bar { position: absolute; inset: 0; }
    .label, .combo-content { position: relative; z-index: 1; color: #fff; text-shadow: 0 1px 2px #000; }
    .label { font-size: 14px; font-weight: bold; padding: 1px 2px 0; }
    .hand-cell.inactive { cursor: default; }
    .combo-chip { min-height: 48px; }
    .combo-content { padding: 4px 6px; font-size: 11px; }
    .combo-title { display: flex; justify-content: space-between; gap: 8px; font-weight: bold; margin-bottom: 4px; }
    .combo-line { display: flex; justify-content: space-between; gap: 8px; }
    .chips, .actions { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { border: 1px solid #999; padding: 3px 6px; }
    .panel { border: 1px solid #bbb; padding: 8px; }
    .mono { font-family: monospace; white-space: pre-wrap; word-break: break-word; }
    .combo-overlay {
      position: absolute;
      left: 8px;
      top: 8px;
      width: min(360px, calc(100% - 16px));
      max-height: calc(100% - 16px);
      overflow: auto;
      background: #fff;
      border: 1px solid #888;
      padding: 6px;
      z-index: 3;
    }
    .overlay-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      align-items: center;
    }
    #treeContainer { display: flex; gap: 8px; align-items: flex-start; overflow-x: auto; padding-bottom: 2px; }
    .node-card {
      border: 1px solid #c8c8c8;
      padding: 6px;
      background: #fff;
      cursor: pointer;
      width: 170px;
      flex: 0 0 170px;
      border-radius: 6px;
    }
    .node-card.active { border-color: #222; box-shadow: inset 0 0 0 1px #222; }
    .node-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .node-title { font-weight: bold; }
    .node-meta { font-size: 12px; color: #333; }
    .node-action-list { margin-top: 6px; }
    .node-action-btn {
      display: block;
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: #222;
      padding: 1px 3px;
      border-radius: 4px;
      line-height: 1.3;
      cursor: pointer;
    }
    .node-action-btn:hover { background: #f1f1f1; }
    .node-action-btn.primary {
      background: #e9e9e9;
      font-weight: 700;
    }
    button { font: inherit; padding: 4px 8px; }
    @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="layout">
    <div>
      <div class="section panel">
        <div class="grid-wrap">
          <div id="comboOverlay" class="combo-overlay" style="display:none;"></div>
          <div id="handGrid" class="hand-grid"></div>
        </div>
        <div id="actionCounters" class="chips" style="margin: 6px 0 4px;"></div>
        <div id="gridCounters" class="chips"></div>
      </div>
    </div>

    <div class="stack">
      <div class="section panel">
        <div class="node-head">
          <div class="node-title">Toy Game: BB vs BTN</div>
        </div>
        <div class="chips">
          <span class="chip">Street: River</span>
          <span class="chip">Board 2c 2d 2h 3c 3d</span>
          <span id="potChip" class="chip">Pot 10</span>
          <span id="nodeEquityChip" class="chip">Node Equity: -</span>
          <span id="nodeEvChip" class="chip">Node EV: -</span>
        </div>
      </div>

      <div class="section panel">
        <div id="treeStatus" class="chip">Loading Node 1...</div>
        <div id="requestInfo" class="mono" style="margin-top:6px;"></div>
      </div>

      <div class="section panel">
        <h3>Tree Selector</h3>
        <div id="treeContainer"></div>
      </div>
    </div>
  </div>

  <script>
    const MAGIC = 0x31534e5a;
    const TOTAL_COMBOS = 1326;
    const COMBO_MASK_BYTES = Math.ceil(TOTAL_COMBOS / 8);
    const ZSTD_MAGIC = [0x28, 0xb5, 0x2f, 0xfd];
    const PROB_SCALE = 65535;
    const EV_SCALE = 100;
    const RANKS_ASC = "23456789TJQKA".split("");
    const RANKS_DESC = "AKQJT98765432".split("");
    const SUITS = "cdhs".split("");
    const EPSILON = 1e-9;

    const COLORS = {
      jam: "#7a0000",
      raise1: "#b30000",
      raise2: "#c73737",
      raise3: "#de6666",
      raise4: "#ef9b9b",
      passive: "#2d9f43",
      fold: "#2b62c9",
      empty: "#000000",
    };

    const GAME = {
      bbStack: 10,
      btnStack: 10,
      bbLabel: "BB",
      btnLabel: "BTN",
    };

    const NODE_FILES = {
      node1: "toy-aaqqkk-bb-1.bin.zst",
      node2: "toy-aaqqkk-btn-2.bin.zst",
      node3: "toy-aaqqkk-btn-3.bin.zst",
      node4: "toy-aaqqkk-bb-4.bin.zst",
    };

    const TRANSITIONS = {
      node1: {
        "all-in": { type: "node", to: "node2" },
        "check": { type: "node", to: "node3" },
      },
      node2: {
        "call": { type: "terminal", text: "" },
        "fold": { type: "terminal", text: "" },
        "all-in": { type: "terminal", text: "" },
      },
      node3: {
        "all-in": { type: "node", to: "node4" },
        "check": { type: "terminal", text: "" },
      },
      node4: {
        "call": { type: "terminal", text: "" },
        "fold": { type: "terminal", text: "" },
        "all-in": { type: "terminal", text: "" },
      },
    };

    const app = {
      catalog: null,
      handClasses: null,
      gridKeys: null,
      nodes: new Map(),
      history: [],
      currentIndex: -1,
      selectedCellKey: "AA",
      selectedComboId: null,
      overlayOpen: false,
      requestInfo: "",
      zstd: null,
      zstdReady: null,
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function formatNumber(value, decimals) {
      return Number(value).toFixed(decimals).replace(/\.?0+$/, "");
    }

    function dequantizeUint16(arr, scale) {
      return Array.from(arr, (value) => value / scale);
    }

    function dequantizeInt16(arr, scale) {
      return Array.from(arr, (value) => value / scale);
    }

    function actionToken(label) {
      return String(label || "")
        .toLowerCase()
        .replace(/%/g, "pct")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function handClassKey(cardA, cardB) {
      if (cardA.rank === cardB.rank) return cardA.rank + cardB.rank;
      const aIndex = RANKS_ASC.indexOf(cardA.rank);
      const bIndex = RANKS_ASC.indexOf(cardB.rank);
      const high = aIndex > bIndex ? cardA.rank : cardB.rank;
      const low = aIndex > bIndex ? cardB.rank : cardA.rank;
      return high + low + (cardA.suit === cardB.suit ? "s" : "o");
    }

    function buildCatalog() {
      const cards = [];
      for (const rank of RANKS_ASC) for (const suit of SUITS) cards.push({ rank, suit, code: rank + suit });

      const combos = [];
      const handClasses = {};
      for (let i = 0; i < cards.length; i += 1) {
        for (let j = i + 1; j < cards.length; j += 1) {
          const a = cards[i];
          const b = cards[j];
          const handKey = handClassKey(a, b);
          const combo = { canonicalId: combos.length, combo: a.code + b.code, handKey };
          combos.push(combo);
          if (!handClasses[handKey]) handClasses[handKey] = { key: handKey, comboIds: [], maxCombos: 0 };
          handClasses[handKey].comboIds.push(combo.canonicalId);
        }
      }

      const gridKeys = [];
      for (let row = 0; row < RANKS_DESC.length; row += 1) {
        for (let col = 0; col < RANKS_DESC.length; col += 1) {
          let key;
          if (row === col) key = RANKS_DESC[row] + RANKS_DESC[col];
          else if (row < col) key = RANKS_DESC[row] + RANKS_DESC[col] + "s";
          else key = RANKS_DESC[col] + RANKS_DESC[row] + "o";
          gridKeys.push(key);
          handClasses[key].maxCombos = handClasses[key].comboIds.length;
        }
      }
      return { combos, handClasses, gridKeys };
    }

    function deriveMeta(meta) {
      const sizesAsc = Array.from(new Set((meta.actionSizes || [])
        .map((value) => Math.round(Number(value) || 0))
        .filter((value) => value >= 0 && value <= 65535)))
        .sort((a, b) => a - b);
      const sizesDesc = [...sizesAsc].sort((a, b) => b - a);
      const actionLabels = [];
      if (!meta.facingAllIn) actionLabels.push("All-in");
      for (const size of sizesDesc) actionLabels.push((meta.facingBet ? "Raise " : "Bet ") + size + "%");
      actionLabels.push(meta.facingBet ? "Call" : "Check");
      if (meta.facingBet) actionLabels.push("Fold");
      const actionCount = actionLabels.length;
      return {
        ...meta,
        maxReach: clamp(Number(meta.maxReach) || 0, 0, 1),
        actionSizes: sizesAsc,
        actionLabels,
        actionCount,
        strategyStoredCount: actionCount - 1,
        evStoredCount: meta.facingBet && meta.foldEvOmitted ? actionCount - 1 : actionCount,
      };
    }

    function createDefaultRow(length) {
      const row = new Array(length).fill(0);
      row[length - 1] = 1;
      return row;
    }

    function normalizeStrategy(row) {
      const clamped = row.map((value) => clamp(value, 0, 1));
      const sum = clamped.reduce((acc, value) => acc + value, 0);
      if (sum <= EPSILON) return createDefaultRow(row.length);
      return clamped.map((value) => value / sum);
    }

    function unpackComboMask(maskBytes) {
      const activeIds = [];
      const bytes = maskBytes instanceof Uint8Array ? maskBytes : new Uint8Array(maskBytes);
      for (let comboId = 0; comboId < TOTAL_COMBOS; comboId += 1) {
        if ((bytes[comboId >> 3] & (1 << (comboId & 7))) !== 0) activeIds.push(comboId);
      }
      return activeIds;
    }

    function isZstdBuffer(buffer) {
      if (!buffer || buffer.byteLength < ZSTD_MAGIC.length) return false;
      const bytes = new Uint8Array(buffer, 0, ZSTD_MAGIC.length);
      for (let i = 0; i < ZSTD_MAGIC.length; i += 1) {
        if (bytes[i] !== ZSTD_MAGIC[i]) return false;
      }
      return true;
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector('script[data-src="' + src + '"]');
        if (existing) {
          existing.addEventListener("load", resolve, { once: true });
          existing.addEventListener("error", reject, { once: true });
          if (existing.dataset.loaded === "1") resolve();
          return;
        }
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.dataset.src = src;
        script.addEventListener("load", () => {
          script.dataset.loaded = "1";
          resolve();
        }, { once: true });
        script.addEventListener("error", () => reject(new Error("Failed to load " + src + ".")), { once: true });
        document.head.appendChild(script);
      });
    }

    async function ensureZstd() {
      if (app.zstd) return app.zstd;
      if (!app.zstdReady) {
        app.zstdReady = (async () => {
          try {
            const mod = await import("https://esm.sh/@oneidentity/zstd-js@1.0.3");
            if (mod && typeof mod.ZstdInit === "function") {
              const codec = await mod.ZstdInit();
              if (codec && codec.ZstdSimple && typeof codec.ZstdSimple.decompress === "function") {
                app.zstd = {
                  decompress(input) {
                    return codec.ZstdSimple.decompress(input);
                  },
                };
                return app.zstd;
              }
            }
          } catch (error) {
            console.warn("Primary Zstd loader failed, trying fallback loader.", error);
          }

          await loadScript("https://cdn.jsdelivr.net/npm/zstd-codec@0.1.5/lib/zstd-codec.js");
          await loadScript("https://cdn.jsdelivr.net/npm/zstd-codec@0.1.5/lib/zstd-codec-binding-wasm.js");
          const fallbackApi = await new Promise((resolve, reject) => {
            if (!window.ZstdCodec || typeof window.ZstdCodec.run !== "function") {
              reject(new Error("Zstd codec did not initialize in either primary or fallback loader."));
              return;
            }
            window.ZstdCodec.run((zstd) => {
              try {
                const simple = new zstd.Simple();
                resolve({
                  decompress(input) {
                    return simple.decompress(input);
                  },
                });
              } catch (error) {
                reject(error);
              }
            });
          });
          app.zstd = fallbackApi;
          return fallbackApi;
        })().catch((error) => {
          app.zstdReady = null;
          throw error;
        });
      }
      return app.zstdReady;
    }

    async function decompressZstd(buffer) {
      const zstd = await ensureZstd();
      const decompressed = zstd.decompress(new Uint8Array(buffer));
      return decompressed.buffer.slice(decompressed.byteOffset, decompressed.byteOffset + decompressed.byteLength);
    }

    function decodeNodeBlob(buffer) {
      const view = new DataView(buffer);
      if (view.getUint32(0, true) !== MAGIC) throw new Error("Invalid blob magic.");
      const schemaVersion = view.getUint16(4, true);
      if (schemaVersion !== 1) throw new Error("Unsupported schema version " + schemaVersion + ".");
      const flags = view.getUint16(6, true);
      const nodeId = view.getUint32(8, true);
      const offsetActionSizes = view.getUint32(12, true);
      const comboCount = view.getUint16(16, true);
      const actionCount = view.getUint8(18);
      const strategyStoredCount = view.getUint8(19);
      const evStoredCount = view.getUint8(20);
      const encodedMaxReach = view.getUint16(22, true);
      const offsetWeights = view.getUint32(24, true);
      const offsetStrategy = view.getUint32(28, true);
      const offsetNodeEv = view.getUint32(36, true);
      const offsetActionEv = view.getUint32(40, true);
      const totalSize = view.getUint32(44, true);
      if (buffer.byteLength !== totalSize) throw new Error("Blob size mismatch.");

      const hasEquity = (flags & (1 << 0)) !== 0;
      const hasNodeEv = (flags & (1 << 1)) !== 0;
      const foldEvOmitted = (flags & (1 << 2)) !== 0;
      const facingBet = (flags & (1 << 3)) !== 0;
      const hasMaxReachScaling = (flags & (1 << 4)) !== 0;
      const facingAllIn = (flags & (1 << 5)) !== 0;
      const maxReach = hasMaxReachScaling ? (encodedMaxReach / PROB_SCALE) : 1;

      const mandatoryActions = (facingAllIn ? 0 : 1) + (facingBet ? 2 : 1);
      const sizeCount = Math.max(0, actionCount - mandatoryActions);
      const weights = new Uint16Array(buffer, offsetWeights, comboCount);
      const strategy = new Uint16Array(buffer, offsetStrategy, comboCount * strategyStoredCount);
      const actionSizes = new Uint16Array(buffer, offsetActionSizes, sizeCount);
      const offsetComboMask = offsetActionSizes + actionSizes.byteLength;
      const comboMask = new Uint8Array(buffer, offsetComboMask, COMBO_MASK_BYTES);
      const activeIds = unpackComboMask(comboMask);
      if (activeIds.length !== comboCount) throw new Error("Combo mask population does not match comboCount.");

      const derivedOffsetEquity = offsetComboMask + COMBO_MASK_BYTES;
      const equity = hasEquity ? new Uint16Array(buffer, derivedOffsetEquity, comboCount) : null;
      const nodeEv = hasNodeEv ? new Int16Array(buffer, offsetNodeEv, comboCount) : null;
      const actionEv = new Int16Array(buffer, offsetActionEv, comboCount * evStoredCount);

      return {
        nodeId,
        comboCount,
        actionCount,
        strategyStoredCount,
        evStoredCount,
        hasEquity,
        hasNodeEv,
        foldEvOmitted,
        facingBet,
        facingAllIn,
        maxReach,
        actionSizes,
        activeIds,
        weights,
        strategy,
        equity,
        nodeEv,
        actionEv,
      };
    }

    function hydrateStateFromDecoded(decoded) {
      const meta = deriveMeta({
        nodeId: decoded.nodeId,
        facingBet: decoded.facingBet,
        facingAllIn: decoded.facingAllIn,
        maxReach: decoded.maxReach,
        hasEquity: decoded.hasEquity,
        hasNodeEv: decoded.hasNodeEv,
        foldEvOmitted: decoded.foldEvOmitted,
        actionSizes: Array.from(decoded.actionSizes),
      });
      const state = {
        meta,
        weights: new Array(TOTAL_COMBOS).fill(0),
        strategy: Array.from({ length: TOTAL_COMBOS }, () => createDefaultRow(meta.actionCount)),
        actionEv: Array.from({ length: TOTAL_COMBOS }, () => new Array(meta.actionCount).fill(0)),
        equity: new Array(TOTAL_COMBOS).fill(0),
        nodeEv: new Array(TOTAL_COMBOS).fill(0),
      };

      const weightsFloat = dequantizeUint16(decoded.weights, PROB_SCALE);
      const strategyFloat = dequantizeUint16(decoded.strategy, PROB_SCALE);
      const equityFloat = decoded.equity ? dequantizeUint16(decoded.equity, PROB_SCALE) : [];
      const nodeEvFloat = decoded.nodeEv ? dequantizeInt16(decoded.nodeEv, EV_SCALE) : [];
      const actionEvFloat = dequantizeInt16(decoded.actionEv, EV_SCALE);

      for (let i = 0; i < decoded.comboCount; i += 1) {
        const comboId = decoded.activeIds[i];
        if (comboId < 0 || comboId >= TOTAL_COMBOS) continue;
        state.weights[comboId] = (weightsFloat[i] || 0) * meta.maxReach;
        const row = new Array(meta.actionCount).fill(0);
        let sum = 0;
        for (let j = 0; j < meta.strategyStoredCount; j += 1) {
          row[j] = strategyFloat[(i * meta.strategyStoredCount) + j] || 0;
          sum += row[j];
        }
        row[row.length - 1] = Math.max(0, 1 - sum);
        state.strategy[comboId] = normalizeStrategy(row);
        if (meta.hasEquity) state.equity[comboId] = equityFloat[i] || 0;
        if (meta.hasNodeEv) state.nodeEv[comboId] = nodeEvFloat[i] || 0;
        const evRow = new Array(meta.actionCount).fill(0);
        for (let j = 0; j < meta.evStoredCount; j += 1) evRow[j] = actionEvFloat[(i * meta.evStoredCount) + j] || 0;
        if (meta.foldEvOmitted && meta.facingBet) evRow[evRow.length - 1] = 0;
        state.actionEv[comboId] = evRow;
      }

      return state;
    }

    function computeMaxReach(weights) {
      let maxValue = 0;
      for (let i = 0; i < weights.length; i += 1) if (weights[i] > maxValue) maxValue = weights[i];
      return maxValue;
    }

    function colorForAction(index, meta) {
      const lastIndex = meta.actionLabels.length - 1;
      const foldIndex = meta.facingBet ? lastIndex : -1;
      const passiveIndex = meta.facingBet ? lastIndex - 1 : lastIndex;
      const label = meta.actionLabels[index] || "";
      if (label === "All-in") return COLORS.jam;
      if (index === foldIndex) return COLORS.fold;
      if (index === passiveIndex) return COLORS.passive;
      const reds = [COLORS.raise1, COLORS.raise2, COLORS.raise3, COLORS.raise4];
      const jamOffset = meta.actionLabels.includes("All-in") ? 1 : 0;
      return reds[Math.min(Math.max(0, index - jamOffset), reds.length - 1)];
    }

    function normalizedDisplayWeight(weight, meta) {
      const maxReach = meta.maxReach || 0;
      if (maxReach <= EPSILON) return 0;
      return clamp(weight / maxReach, 0, 1);
    }

    function makeBarSegments(actionTotals, totalSlots, meta) {
      const segments = [];
      let left = 0;
      for (let i = 0; i < actionTotals.length; i += 1) {
        const width = totalSlots > 0 ? (actionTotals[i] / totalSlots) * 100 : 0;
        if (width <= 0.001) continue;
        segments.push({ left, width, color: colorForAction(i, meta) });
        left += width;
      }
      if (left < 100) segments.push({ left, width: 100 - left, color: COLORS.empty });
      return segments;
    }

    function renderSegmentsHtml(segments) {
      return segments.map((segment) => `<span style="position:absolute;top:0;bottom:0;left:${segment.left}%;width:${segment.width}%;background:${segment.color};"></span>`).join("");
    }

    function getHistoryEntry(index) {
      if (index < 0 || index >= app.history.length) return null;
      return app.history[index];
    }

    function getCurrentEntry() {
      return getHistoryEntry(app.currentIndex);
    }

    function potForHistoryIndex(index) {
      let pot = 10;
      const end = Math.min(index, app.history.length - 1);
      for (let i = 1; i <= end; i += 1) {
        const entry = app.history[i];
        if (!entry || !entry.incomingAction) continue;
        const token = actionToken(entry.incomingAction);
        if (token.startsWith("all-in")) pot += 10;
        else if (token.startsWith("call")) pot += 10;
      }
      return pot;
    }

    function weightedNodeStats(node) {
      if (!node) return { equity: null, nodeEv: null };
      const { state } = node;
      let totalWeight = 0;
      let equityWeighted = 0;
      let nodeEvWeighted = 0;
      for (let comboId = 0; comboId < TOTAL_COMBOS; comboId += 1) {
        const weight = state.weights[comboId] || 0;
        if (weight <= EPSILON) continue;
        totalWeight += weight;
        if (state.meta.hasEquity) equityWeighted += weight * (state.equity[comboId] || 0);
        let comboNodeEv = 0;
        const strategyRow = state.strategy[comboId] || [];
        const actionEvRow = state.actionEv[comboId] || [];
        for (let actionIndex = 0; actionIndex < state.meta.actionCount; actionIndex += 1) {
          comboNodeEv += (strategyRow[actionIndex] || 0) * (actionEvRow[actionIndex] || 0);
        }
        nodeEvWeighted += weight * comboNodeEv;
      }
      if (totalWeight <= EPSILON) return { equity: null, nodeEv: null };
      return {
        equity: state.meta.hasEquity ? (equityWeighted / totalWeight) : null,
        nodeEv: nodeEvWeighted / totalWeight,
      };
    }

    function renderTopSummary(node) {
      const pot = potForHistoryIndex(app.currentIndex);
      byId("potChip").textContent = "Pot " + formatNumber(pot, 2);
      const stats = weightedNodeStats(node);
      byId("nodeEquityChip").textContent = stats.equity == null
        ? "Node Equity: -"
        : ("Node Equity: " + formatNumber(stats.equity * 100, 2) + "%");
      byId("nodeEvChip").textContent = stats.nodeEv == null
        ? "Node EV: -"
        : ("Node EV: " + formatNumber(stats.nodeEv, 2));
    }

    function getDisplayNode() {
      const entry = getCurrentEntry();
      if (!entry) return null;
      if (entry.type === "node") return app.nodes.get(entry.nodeKey) || null;
      for (let i = app.currentIndex - 1; i >= 0; i -= 1) {
        const prev = app.history[i];
        if (prev && prev.type === "node") return app.nodes.get(prev.nodeKey) || null;
      }
      return null;
    }

    function cellStats(comboIds, node) {
      const { state } = node;
      const actionTotals = new Array(state.meta.actionCount).fill(0);
      const displayActionTotals = new Array(state.meta.actionCount).fill(0);
      let weightedCombos = 0;
      let activeCombos = 0;
      for (const comboId of comboIds) {
        const weight = state.weights[comboId];
        const displayWeight = normalizedDisplayWeight(weight, state.meta);
        if (weight > EPSILON) activeCombos += 1;
        weightedCombos += weight;
        for (let i = 0; i < actionTotals.length; i += 1) {
          actionTotals[i] += weight * state.strategy[comboId][i];
          displayActionTotals[i] += displayWeight * state.strategy[comboId][i];
        }
      }
      return { weightedCombos, activeCombos, actionTotals, displayActionTotals };
    }

    function renderCounters(node) {
      const { state } = node;
      const actionTotals = new Array(state.meta.actionCount).fill(0);
      let activeCombos = 0;
      let weightedCombos = 0;
      for (let comboId = 0; comboId < TOTAL_COMBOS; comboId += 1) {
        const weight = state.weights[comboId];
        if (weight > EPSILON) activeCombos += 1;
        weightedCombos += weight;
        for (let i = 0; i < actionTotals.length; i += 1) actionTotals[i] += weight * state.strategy[comboId][i];
      }
      byId("gridCounters").innerHTML = `<span class="chip">Active Combos: ${activeCombos}</span><span class="chip">Weighted Combos: ${formatNumber(weightedCombos, 2)}</span>`;
      byId("actionCounters").innerHTML = actionTotals.map((value, index) => {
        const pct = weightedCombos > EPSILON ? (value / weightedCombos) * 100 : 0;
        return `<span class="chip" style="background:${colorForAction(index, state.meta)};color:white;">${state.meta.actionLabels[index]} ${formatNumber(pct, 1)}% (${formatNumber(value, 2)} combos)</span>`;
      }).join("");
    }

    function renderGrid(node) {
      const { state } = node;
      byId("handGrid").innerHTML = app.gridKeys.map((key) => {
        const hand = app.handClasses[key];
        const stats = cellStats(hand.comboIds, node);
        const inactive = stats.activeCombos === 0;
        const selected = app.selectedCellKey === key && app.selectedComboId == null;
        return `
          <div class="hand-cell${selected ? " selected" : ""}${inactive ? " inactive" : ""}" data-hand-key="${key}" data-active="${inactive ? "0" : "1"}">
            <div class="bar">${renderSegmentsHtml(makeBarSegments(stats.displayActionTotals, hand.maxCombos, state.meta))}</div>
            <div class="label">${key}</div>
          </div>
        `;
      }).join("");
    }

    function renderSelection(node) {
      const overlay = byId("comboOverlay");
      const comboIds = app.selectedCellKey ? app.handClasses[app.selectedCellKey].comboIds : [];
      if (!comboIds.length || !app.overlayOpen || !app.selectedCellKey) {
        overlay.style.display = "none";
        overlay.innerHTML = "";
        return;
      }
      const { state } = node;
      overlay.style.display = "block";
      overlay.innerHTML = `
        <div class="overlay-head">
          <strong>${app.selectedCellKey}</strong>
          <button type="button" id="closeOverlayBtn">x</button>
        </div>
        <div class="stack">
        ${comboIds.map((comboId) => {
        const combo = app.catalog.combos[comboId];
        const selected = app.selectedComboId === comboId;
        const displayWeight = normalizedDisplayWeight(state.weights[comboId], state.meta);
        const weighted = state.strategy[comboId].map((value) => value * displayWeight);
        return `
          <div class="combo-chip${selected ? " selected" : ""}" data-combo-id="${comboId}">
            <div class="bar">${renderSegmentsHtml(makeBarSegments(weighted, 1, state.meta))}</div>
            <div class="combo-content">
              <div class="combo-title"><span>${combo.combo}</span></div>
              ${state.meta.actionLabels.map((label, index) => `<div class="combo-line"><span>${label} ${formatNumber(state.strategy[comboId][index] * 100, 1)}%</span><span>${formatNumber(state.actionEv[comboId][index] || 0, 2)}</span></div>`).join("")}
            </div>
          </div>
        `;
      }).join("")}
        </div>
      `;
    }

    function renderRequestInfo() {
      byId("requestInfo").textContent = app.requestInfo || "";
    }

    function nodeLabel(nodeKey) {
      if (nodeKey === "node1") return "Node 1";
      if (nodeKey === "node2") return "Node 2";
      if (nodeKey === "node3") return "Node 3";
      if (nodeKey === "node4") return "Node 4";
      return nodeKey;
    }

    function renderTree() {
      const container = byId("treeContainer");
      container.innerHTML = app.history.map((entry, index) => {
        const isActive = index === app.currentIndex;
        if (entry.type === "terminal") {
          return `
            <div class="node-card${isActive ? " active" : ""}" data-history-index="${index}">
              <div class="node-title">Terminal</div>
            </div>
          `;
        }

        const loadedNode = app.nodes.get(entry.nodeKey);
        const actor = index % 2 === 0 ? GAME.bbLabel : GAME.btnLabel;
        const actorStack = actor === GAME.bbLabel ? GAME.bbStack : GAME.btnStack;
        const title = loadedNode ? actor : actor;
        const nextEntry = app.history[index + 1] || null;
        const selectedActionToken = nextEntry && nextEntry.incomingAction ? actionToken(nextEntry.incomingAction) : "";
        const actions = loadedNode
          ? loadedNode.state.meta.actionLabels.map((label, actionIndex) => {
            const primary = selectedActionToken && actionToken(label) === selectedActionToken ? " primary" : "";
            return `<button type="button" class="node-action-btn${primary}" data-history-index="${index}" data-action-index="${actionIndex}">${label}</button>`;
          }).join("")
          : "";
        return `
          <div class="node-card${isActive ? " active" : ""}" data-history-index="${index}">
            <div class="node-head">
              <div class="node-title">${title}</div>
              <div class="node-meta">${formatNumber(actorStack, 1)}</div>
            </div>
            <div class="node-action-list">${actions}</div>
          </div>
        `;
      }).join("");
    }

    function renderTreeStatus() {
      const entry = getCurrentEntry();
      if (!entry) {
        byId("treeStatus").textContent = "No node loaded.";
        return;
      }
      if (entry.type === "terminal") {
        byId("treeStatus").textContent = "Terminal " + entry.text; // Not using entry text for now, just a test feature
        return;
      }
      byId("treeStatus").textContent = "Current Node: " + nodeLabel(entry.nodeKey);
    }

    function bindGridEvents() {
      const node = getDisplayNode();
      if (!node) return;
      byId("handGrid").querySelectorAll(".hand-cell").forEach((cell) => {
        const key = cell.getAttribute("data-hand-key");
        const isActive = cell.getAttribute("data-active") === "1";
        cell.addEventListener("click", () => {
          app.selectedCellKey = key;
          app.selectedComboId = null;
          app.overlayOpen = false;
          renderAll();
        });
        cell.addEventListener("contextmenu", (event) => {
          if (!isActive) return;
          event.preventDefault();
          app.selectedCellKey = key;
          app.selectedComboId = null;
          app.overlayOpen = true;
          renderAll();
        });
      });

      byId("comboOverlay").querySelectorAll(".combo-chip").forEach((chip) => {
        const comboId = Number(chip.getAttribute("data-combo-id"));
        chip.addEventListener("click", () => {
          app.selectedComboId = comboId;
          app.selectedCellKey = app.catalog.combos[comboId].handKey;
          renderAll();
        });
      });

      const closeBtn = byId("closeOverlayBtn");
      if (closeBtn) {
        closeBtn.addEventListener("click", () => {
          app.overlayOpen = false;
          app.selectedComboId = null;
          renderAll();
        });
      }
    }

    function renderAll() {
      const node = getDisplayNode();
      renderTree();
      renderTreeStatus();
      renderRequestInfo();
      renderTopSummary(node);
      if (!node) {
        byId("handGrid").innerHTML = "";
        byId("actionCounters").innerHTML = "";
        byId("gridCounters").innerHTML = "";
        byId("comboOverlay").style.display = "none";
        return;
      }
      node.state.meta.maxReach = computeMaxReach(node.state.weights);
      renderCounters(node);
      renderGrid(node);
      renderSelection(node);
      bindGridEvents();
    }

    async function loadNodeByKey(nodeKey, force) {
      if (!force && app.nodes.has(nodeKey)) return;
      const filename = NODE_FILES[nodeKey];
      if (!filename) throw new Error("No file mapping for " + nodeKey + ".");
      app.requestInfo = "Requesting " + filename;
      renderRequestInfo();
      const response = await fetch(filename, { cache: "no-store" });
      if (!response.ok) throw new Error("Failed to load " + filename + " (" + response.status + ").");
      const rawBuffer = await response.arrayBuffer();
      const buffer = (isZstdBuffer(rawBuffer) || /\.zst$/i.test(filename)) ? await decompressZstd(rawBuffer) : rawBuffer;
      const decoded = decodeNodeBlob(buffer);
      const hydrated = hydrateStateFromDecoded(decoded);
      app.nodes.set(nodeKey, { source: filename, decoded, state: hydrated });
      app.requestInfo = "Loaded " + filename;
      renderRequestInfo();
    }

    function resolveTransition(nodeKey, actionLabel) {
      const map = TRANSITIONS[nodeKey] || {};
      const token = actionToken(actionLabel);
      if (map[token]) return map[token];
      if (token.startsWith("all-in") && map["all-in"]) return map["all-in"];
      if (token.startsWith("check") && map["check"]) return map["check"];
      if (token.startsWith("call") && map["call"]) return map["call"];
      if (token.startsWith("fold") && map["fold"]) return map["fold"];
      return { type: "terminal", text: "No mapped next node for action '" + actionLabel + "'." };
    }

    async function navigateToHistory(index) {
      if (index < 0 || index >= app.history.length) return;
      app.currentIndex = index;
      const entry = app.history[index];
      if (entry.type === "node") await loadNodeByKey(entry.nodeKey);
      renderAll();
    }

    async function navigateAction(fromIndex, actionIndex) {
      const entry = getHistoryEntry(fromIndex);
      if (!entry || entry.type !== "node") return;
      const fromNode = app.nodes.get(entry.nodeKey);
      if (!fromNode) return;
      const actionLabel = fromNode.state.meta.actionLabels[actionIndex];
      const transition = resolveTransition(entry.nodeKey, actionLabel);
      app.history = app.history.slice(0, fromIndex + 1);

      if (transition.type === "node") {
        await loadNodeByKey(transition.to);
        app.history.push({
          type: "node",
          nodeKey: transition.to,
          incomingAction: actionLabel,
        });
        app.currentIndex = app.history.length - 1;
      } else {
        app.history.push({
          type: "terminal",
          incomingAction: actionLabel,
          text: transition.text,
        });
        app.currentIndex = app.history.length - 1;
      }
      renderAll();
    }

    function wireStaticEvents() {
      document.addEventListener("click", async (event) => {
        const actionBtn = event.target.closest("button[data-action-index]");
        if (actionBtn) {
          const fromIndex = Number(actionBtn.getAttribute("data-history-index"));
          const actionIndex = Number(actionBtn.getAttribute("data-action-index"));
          try {
            await navigateAction(fromIndex, actionIndex);
          } catch (error) {
            app.requestInfo = String(error && error.message ? error.message : error);
            renderRequestInfo();
          }
          return;
        }

        const card = event.target.closest(".node-card");
        if (card) {
          const index = Number(card.getAttribute("data-history-index"));
          try {
            await navigateToHistory(index);
          } catch (error) {
            app.requestInfo = String(error && error.message ? error.message : error);
            renderRequestInfo();
          }
        }
      });
    }

    async function init() {
      const built = buildCatalog();
      if (built.combos.length !== 1326) throw new Error("Failed to build 1326 canonical combos.");
      app.catalog = built;
      app.handClasses = built.handClasses;
      app.gridKeys = built.gridKeys;
      wireStaticEvents();

      app.history = [{ type: "node", nodeKey: "node1", incomingAction: null }];
      app.currentIndex = 0;

      try {
        await loadNodeByKey("node1");
      } catch (error) {
        app.requestInfo = String(error && error.message ? error.message : error);
      }
      renderAll();
    }

    if (typeof window !== "undefined" && typeof document !== "undefined") {
      init().catch((error) => {
        app.requestInfo = String(error && error.message ? error.message : error);
        renderRequestInfo();
      });
    }
  </script>
</body>
</html>
